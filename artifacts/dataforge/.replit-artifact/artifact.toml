kind = "web"
previewPath = "/"
title = "DataForge"
version = "1.0.0"
id = "artifacts/dataforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19975

[services.development]
run = "pnpm --filter @workspace/dataforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dataforge", "run", "build" ]
publicDir = "artifacts/dataforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19975"
BASE_PATH = "/"
